# Div Label style spec for Administrative Writing Advanced textbook.
#
# Used by: scripts/manage_docx_styles.py (manual maintenance tool)
# Reference DOCX: adv/aw-adv-styleref.docx
#
# Colors are from the 16-color MIT palette. Temporary for print testing;
# user will adjust after print review.
#
# manage_docx_styles.py updates three color locations that must stay in sync:
#   1. paragraph style w:rPr/w:color/@w:val
#   2. paragraph style w:rPr/w14:textFill/w14:solidFill/w14:srgbClr/@w14:val
#   3. character style w:rPr/w:color/@w:val

font:
  replace:
    "Roboto Condensed": "Calibri"
    "Roboto Condensed Medium": "Calibri"
  set_div_label_font: "Calibri"

groups:
  div-labels:
    clone_from:
      paragraph: "Div Label Language"
      character: "Div Label Language Char"
    based_on: "Div Label Base"
    next: "Div Content"
    styles:
      - div_class: "model"
        paragraph_style: "Div Label Model"
        character_style: "Div Label Model Char"
        emoji: "📄"
        color_name: "Dk. Gray"
        color_hex: "575757"

      - div_class: "model-bad"
