# Div style spec for Administrative Writing Advanced textbook — 9-class system.
#
# Used by: scripts/manage_docx_styles.py (manual maintenance tool only)
# Reference DOCX: adv/md/working/aw-adv-styleref.docx
#
# Style names match the simplified 9-class scheme: "Div Learn", "Div Write", etc.
# (no "Label" in the name — that was the old multi-class system)
#
# manage_docx_styles.py updates three color locations that must stay in sync:
#   1. paragraph style w:rPr/w:color/@w:val
#   2. paragraph style w:rPr/w14:textFill/w14:solidFill/w14:srgbClr/@w14:val
#   3. character style w:rPr/w:color/@w:val
#
# NOTE: manage_docx_styles.py applies Div Label * paragraph formatting only to
# styles whose name starts with "Div Label ". The 9 Div * styles inherit their
# paragraph formatting from Div Label Base via basedOn — no separate pass needed.

font:
  replace:
    "Roboto Condensed": "Calibri"
    "Roboto Condensed Medium": "Calibri"

groups:
  div-styles:
    styles:
      - div_class: "learn"
        paragraph_style: "Div Learn"
        character_style: "Div Learn Char"
        color_name: "Green"
        color_hex: "2C9167"

      - div_class: "language"
        paragraph_style: "Div Language"
        character_style: "Div Language Char"
        color_name: "Teal-Green"
        color_hex: "39AC88"

      - div_class: "structure"
        paragraph_style: "Div Structure"
        character_style: "Div Structure Char"
        color_name: "Teal"
        color_hex: "49C0A4"

      - div_class: "notice"
        paragraph_style: "Div Notice"
        character_style: "Div Notice Char"
        color_name: "Amber"
        color_hex: "D5BB68"

      - div_class: "edit"
        paragraph_style: "Div Edit"
        character_style: "Div Edit Char"
        color_name: "Orange-Red"
        color_hex: "D69676"

      - div_class: "rewrite"
        paragraph_style: "Div Rewrite"
        character_style: "Div Rewrite Char"
        color_name: "Magenta-Rose"
        color_hex: "943368"

      - div_class: "revise"
        paragraph_style: "Div Revise"
        character_style: "Div Revise Char"
        color_name: "Rose-Pink"
        color_hex: "C05080"

      - div_class: "write"
        paragraph_style: "Div Write"
        character_style: "Div Write Char"
        color_name: "Dark Purple"
        color_hex: "4C1E5D"

      - div_class: "example"
        paragraph_style: "Div Example"
        character_style: "Div Example Char"
        color_name: "Lime-Green"
        color_hex: "9CCF78"
